<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Mnemo · DataCamp Bridge</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 380px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #f4f4f5;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid #27272a;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #10b981, #047857);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: #0a0a0a;
    }
    .header h1 { font-size: 14px; font-weight: 700; }
    .header p {
      font-size: 10px; color: #71717a;
      letter-spacing: 0.05em; text-transform: uppercase;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 6px;
      margin-bottom: 10px;
      font-size: 11px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #52525b;
      animation: pulse 2s infinite;
    }
    .status-dot.connected { background: #10b981; }
    .status-dot.datacamp { background: #3b82f6; }
    .status-dot.error { background: #ef4444; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .section { margin-bottom: 12px; }
    .section h2 {
      font-size: 10px; color: #71717a;
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 6px;
    }

    .btn {
      width: 100%;
      padding: 10px;
      background: #10b981;
      color: #0a0a0a;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:hover:not(:disabled) { background: #34d399; }
    .btn:disabled { background: #27272a; color: #71717a; cursor: not-allowed; }
    .btn-secondary {
      background: transparent;
      border: 1px solid #3f3f46;
      color: #e4e4e7;
    }
    .btn-secondary:hover:not(:disabled) { background: #18181b; }

    .input {
      width: 100%;
      padding: 8px 10px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 6px;
      color: #f4f4f5;
      font-size: 12px;
    }
    .input:focus { outline: none; border-color: #10b981; }

    .detected-card {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.08), rgba(16, 185, 129, 0.05));
      border: 1px solid rgba(59, 130, 246, 0.25);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
    }
    .detected-label {
      font-size: 9px;
      color: #3b82f6;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }
    .detected-title {
      font-size: 13px;
      font-weight: 700;
      color: #f4f4f5;
      margin-bottom: 2px;
    }
    .detected-sub {
      font-size: 11px;
      color: #a1a1aa;
      line-height: 1.4;
    }
    .detected-meta {
      display: flex;
      gap: 6px;
      margin-top: 6px;
      flex-wrap: wrap;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 9px;
      font-weight: 600;
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }
    .chip.lang { background: rgba(59, 130, 246, 0.15); color: #93c5fd; border-color: rgba(59, 130, 246, 0.3); }

    .preview {
      max-height: 100px;
      overflow-y: auto;
      padding: 8px;
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 6px;
      font-size: 10px;
      color: #a1a1aa;
      font-family: monospace;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .info {
      font-size: 11px;
      color: #71717a;
      line-height: 1.5;
      padding: 8px 10px;
      background: rgba(245, 158, 11, 0.05);
      border: 1px solid rgba(245, 158, 11, 0.2);
      border-radius: 6px;
      margin-bottom: 10px;
    }
    .info strong { color: #f59e0b; }

    .toast {
      position: fixed;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 14px;
      background: #10b981;
      color: #0a0a0a;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 100;
      max-width: 340px;
      text-align: center;
    }
    .toast.show { opacity: 1; }
    .toast.error { background: #ef4444; color: #fff; }

    .row { display: flex; gap: 6px; }
    .row .btn { flex: 1; }

    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      font-size: 11px;
      color: #71717a;
    }
    .spinner {
      width: 12px; height: 12px;
      border: 2px solid #3f3f46;
      border-top-color: #10b981;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">M</div>
    <div>
      <h1>Mnemo Bridge</h1>
      <p>v1.3.1 · DataCamp → Missions</p>
    </div>
  </div>

  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">Vérification...</span>
  </div>

  <div class="section">
    <h2>Serveur Mnemo</h2>
    <input type="url" class="input" id="serverUrl" placeholder="https://votre-app.vercel.app" value="http://localhost:3000">
  </div>

  <!-- DataCamp context detection -->
  <div id="contextSection" style="display:none">
    <div class="detected-card" id="detectedCard">
      <div class="detected-label">Cours DataCamp détecté</div>
      <div class="detected-title" id="dcCourseTitle">-</div>
      <div class="detected-sub" id="dcCurriculumTitle">-</div>
      <div class="detected-meta" id="dcMeta"></div>
    </div>
  </div>

  <div id="notDatacampSection">
    <div class="info">
      Naviguez vers <strong>app.datacamp.com</strong> pour activer la capture automatique.
    </div>
  </div>

  <div id="captureSection" style="display:none">
    <button class="btn" id="captureBtn">Capturer & Envoyer</button>
    <div class="preview" id="preview" style="display:none"></div>
  </div>

  <div id="loadingSection" style="display:none">
    <div class="loading">
      <div class="spinner"></div>
      <span id="loadingText">Capture en cours...</span>
    </div>
  </div>

  <div class="row" style="margin-top: 10px;">
    <button class="btn btn-secondary" id="refreshBtn">Rafraîchir</button>
    <button class="btn btn-secondary" id="openAppBtn">Ouvrir Mnemo</button>
  </div>

  <div class="toast" id="toast"></div>

  <script src="popup.js"></script>
</body>
</html>
